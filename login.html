<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | SIMPEGDIK NGADA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(rgba(21,101,192,.85),rgba(21,101,192,.85)),
               url('assets/bg-login.jpg');
    background-size:cover;
    background-position:center;
    height:100vh;
}

.login-box{

    width:420px;
    background:white;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    padding:35px;

}

.logo{

    width:90px;

}

.btn-login{

    background:#1565C0;
    color:white;
    font-weight:bold;
    border-radius:8px;

}

.btn-login:hover{

    background:#0D47A1;
    color:white;

}

.form-control{

    border-radius:8px;

}

.footer{

    font-size:13px;
    color:#666;

}

</style>

</head>

<body>

<div class="container h-100">

<div class="row justify-content-center align-items-center h-100">

<div class="col-md-5">

<div class="login-box mx-auto">

<div class="text-center">

<img src="assets/logo-ngada.png" class="logo mb-3">

<h3 class="fw-bold text-primary">

SIMPEGDIK NGADA

</h3>

<p class="text-muted">

Sistem Informasi Guru dan Pegawai

<br>

Dinas Pendidikan dan Kebudayaan Kabupaten Ngada

</p>

</div>

<form action="dashboard.html" method="post">

<div class="mb-3">

<label class="form-label">

Username

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-person-fill"></i>

</span>

<input
type="text"
class="form-control"
placeholder="Masukkan Username"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-lock-fill"></i>

</span>

<input
type="password"
id="password"
class="form-control"
placeholder="Masukkan Password"
required>

<button class="btn btn-outline-secondary"
type="button"
onclick="lihatPassword()">

<i class="bi bi-eye-fill"></i>

</button>

</div>

</div>

<div class="mb-3 form-check">

<input
type="checkbox"
class="form-check-input">

<label class="form-check-label">

Ingat Saya

</label>

</div>

<button class="btn btn-login w-100">

<i class="bi bi-box-arrow-in-right"></i>

LOGIN

</button>

</form>

<hr>

<div class="text-center">

<a href="#" class="text-decoration-none">

Lupa Password?

</a>

</div>

<div class="text-center mt-3 footer">

© 2026 SIMPEGDIK NGADA

<br>

Dinas Pendidikan dan Kebudayaan Kabupaten Ngada

</div>

</div>

</div>

</div>

</div>

<script>

function lihatPassword(){

let x=document.getElementById("password");

if(x.type==="password"){

x.type="text";

}else{

x.type="password";

}

}

</script>

</body>
</html>
