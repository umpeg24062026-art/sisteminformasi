<!DOCTYPE html>

    <!-- Bootstrap -->

    <!-- Bootstrap Icons -->

    <style>

        body{
            margin:0;
            font-family:Segoe UI, sans-serif;
            background:#f4f6f9;
        }

        .sidebar{
            width:270px;
            height:100vh;
            background:#1565C0;
            position:fixed;
            left:0;
            top:0;
            overflow-y:auto;
            color:white;
        }

        .sidebar-header{
            text-align:center;
            padding:20px;
            border-bottom:1px solid rgba(255,255,255,.2);
        }

        .sidebar-header img{
            width:80px;
            margin-bottom:10px;
        }

        .sidebar-header h4{
            margin:0;
        }

        .sidebar-header small{
            color:#ddd;
        }

        .menu-title{
            padding:12px 20px;
            font-size:13px;
            color:#BBDEFB;
            font-weight:bold;
            text-transform:uppercase;
        }

        .sidebar ul{
            list-style:none;
            margin:0;
            padding:0;
        }

        .sidebar ul li a{

            display:block;

            color:white;

            text-decoration:none;

            padding:12px 20px;

            transition:.3s;

        }

        .sidebar ul li a:hover{

            background:#0D47A1;

            padding-left:28px;

        }

        .sidebar ul li a i{

            margin-right:10px;

            width:22px;

        }

        .submenu{

            padding-left:25px;

            background:#1976D2;

        }

        .submenu a{

            font-size:14px;

        }

    </style>

</head>
