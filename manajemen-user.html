<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manajemen User | SIMPEGDIK NGADA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    font-family:'Segoe UI',sans-serif;
}

.header{
    background:#1565C0;
    color:white;
    padding:20px;
}

.card{
    border:none;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.table th{
    background:#1565C0;
    color:white;
    text-align:center;
}

.table td{
    vertical-align:middle;
}

.btn{
    border-radius:8px;
}

.form-control,
.form-select{
    border-radius:8px;
}

</style>

</head>

<body>

<div class="header">

<h3>
<i class="bi bi-people-fill"></i>
MANAJEMEN USER
</h3>

<p>
SIMPEGDIK NGADA
<br>
Dinas Pendidikan dan Kebudayaan Kabupaten Ngada
</p>

</div>

<div class="container mt-4">

<div class="card">

<div class="card-body">

<div class="d-flex justify-content-between mb-3">

<h5>Data Pengguna</h5>

<button class="btn btn-success">

<i class="bi bi-person-plus-fill"></i>

Tambah User

</button>

</div>

<div class="row mb-3">

<div class="col-md-4">

<input type="text"
class="form-control"
placeholder="Cari Nama / Username">

</div>

<div class="col-md-3">

<select class="form-select">

<option>Semua Role</option>
<option>Super Admin</option>
<option>Admin Dinas</option>
<option>Operator Sekolah</option>

</select>

</div>

<div class="col-md-3">

<select class="form-select">

<option>Semua Status</option>
<option>Aktif</option>
<option>Tidak Aktif</option>

</select>

</div>

<div class="col-md-2">

<button class="btn btn-primary w-100">

<i class="bi bi-search"></i>

Cari

</button>

</div>

</div>

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>No</th>

<th>Nama</th>

<th>Username</th>

<th>Role</th>

<th>Sekolah / Unit Kerja</th>

<th>Status</th>

<th>Aksi</th>

</tr>

</thead>

<tbody>

<tr>

<td>1</td>

<td>Administrator</td>

<td>admin</td>

<td>
<span class="badge bg-danger">
Super Admin
</span>
</td>

<td>Dinas Pendidikan</td>

<td>
<span class="badge bg-success">
Aktif
</span>
</td>

<td>

<button class="btn btn-warning btn-sm">

<i class="bi bi-pencil"></i>

</button>

<button class="btn btn-danger btn-sm">

<i class="bi bi-trash"></i>

</button>

<button class="btn btn-info btn-sm">

<i class="bi bi-key"></i>

</button>

</td>

</tr>

<tr>

<td>2</td>

<td>Maria Yosefa</td>

<td>operator01</td>

<td>
<span class="badge bg-primary">
Operator
</span>
</td>

<td>SMP Negeri 1 Bajawa</td>

<td>
<span class="badge bg-success">
Aktif
</span>
</td>

<td>

<button class="btn btn-warning btn-sm">
<i class="bi bi-pencil"></i>
</button>

<button class="btn btn-danger btn-sm">
<i class="bi bi-trash"></i>
</button>

<button class="btn btn-info btn-sm">
<i class="bi bi-key"></i>
</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

<!-- Form Tambah/Edit -->

<div class="card mt-4">

<div class="card-header bg-primary text-white">

<b>Form User</b>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-6">

<label>Nama Lengkap</label>

<input type="text" class="form-control">

</div>

<div class="col-md-6">

<label>Username</label>

<input type="text" class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Password</label>

<input type="password" class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Konfirmasi Password</label>

<input type="password" class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Role</label>

<select class="form-select">

<option>Super Admin</option>
<option>Admin Dinas</option>
<option>Operator Sekolah</option>

</select>

</div>

<div class="col-md-6 mt-3">

<label>Sekolah / Unit Kerja</label>

<select class="form-select">

<option>Pilih Sekolah</option>
<option>SMP Negeri 1 Bajawa</option>
<option>SD Negeri Turekisa</option>
<option>Dinas Pendidikan</option>

</select>

</div>

<div class="col-md-6 mt-3">

<label>Status</label>

<select class="form-select">

<option>Aktif</option>
<option>Tidak Aktif</option>

</select>

</div>

</div>

<div class="text-end mt-4">

<button class="btn btn-success">

<i class="bi bi-save"></i>

Simpan

</button>

<button class="btn btn-secondary">

Reset

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
