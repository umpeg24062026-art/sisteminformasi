<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Menu Usulan - SIMPEGDIK NGADA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    font-family:Segoe UI,sans-serif;
}

.header{
    background:#1565C0;
    color:white;
    padding:20px;
}

.card{
    border:none;
    border-radius:12px;
    box-shadow:0 5px 12px rgba(0,0,0,.15);
}

h5{
    color:#1565C0;
}

.btn{
    border-radius:8px;
}

</style>

</head>

<body>

<div class="header">

<h3><i class="bi bi-folder2-open"></i> MENU USULAN</h3>

<p>Sistem Informasi Guru dan Pegawai Kabupaten Ngada</p>

</div>

<div class="container mt-4">

<div class="card">

<div class="card-body">

<ul class="nav nav-tabs">

<li class="nav-item">

<button class="nav-link active"
data-bs-toggle="tab"
data-bs-target="#kp">

Kenaikan Pangkat

</button>

</li>

<li class="nav-item">

<button class="nav-link"
data-bs-toggle="tab"
data-bs-target="#kgb">

Kenaikan Gaji Berkala

</button>

</li>

<li class="nav-item">

<button class="nav-link"
data-bs-toggle="tab"
data-bs-target="#cuti">

Cuti

</button>

</li>

</ul>

<div class="tab-content mt-4">

<!-- KP -->

<div class="tab-pane fade show active" id="kp">

<h5>Usulan Kenaikan Pangkat</h5>

<div class="row">

<div class="col-md-6">

<label>NIP</label>
<input class="form-control">

</div>

<div class="col-md-6">

<label>Nama</label>
<input class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Pangkat Lama</label>
<input class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Pangkat Baru</label>
<input class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>TMT Pangkat</label>
<input type="date" class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Jenis KP</label>

<select class="form-select">

<option>Reguler</option>

<option>Pilihan</option>

<option>Penyesuaian Ijazah</option>

</select>

</div>

</div>

<hr>

<h6>Upload Dokumen</h6>

<div class="mb-2">
<label>SK Pangkat Terakhir</label>
<input type="file" class="form-control">
</div>

<div class="mb-2">
<label>SK Jabatan</label>
<input type="file" class="form-control">
</div>

<div class="mb-2">
<label>PAK</label>
<input type="file" class="form-control">
</div>

<div class="mb-2">
<label>SKP 2 Tahun Terakhir</label>
<input type="file" class="form-control">
</div>

<div class="mb-2">
<label>Ijazah</label>
<input type="file" class="form-control">
</div>

<div class="text-end">

<button class="btn btn-success">
<i class="bi bi-save"></i>
Simpan
</button>

<button class="btn btn-primary">
<i class="bi bi-send"></i>
Kirim ke Dinas
</button>

</div>

</div>

<!-- KGB -->

<div class="tab-pane fade" id="kgb">

<h5>Usulan Kenaikan Gaji Berkala</h5>

<div class="row">

<div class="col-md-6">

<label>NIP</label>
<input class="form-control">

</div>

<div class="col-md-6">

<label>Nama</label>
<input class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Golongan</label>
<input class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Masa Kerja</label>
<input class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>TMT KGB Terakhir</label>
<input type="date" class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>TMT KGB Berikutnya</label>
<input type="date" class="form-control">

</div>

</div>

<hr>

<h6>Upload Dokumen</h6>

<div class="mb-2">
<label>SK KGB Terakhir</label>
<input type="file" class="form-control">
</div>

<div class="mb-2">
<label>SK Pangkat Terakhir</label>
<input type="file" class="form-control">
</div>

<div class="mb-2">
<label>SKP Tahun Terakhir</label>
<input type="file" class="form-control">
</div>

<div class="mb-2">
<label>SKP Dua Tahun Terakhir</label>
<input type="file" class="form-control">
</div>

<div class="mb-2">
<label>Dokumen Pendukung</label>
<input type="file" class="form-control">
</div>

<div class="text-end">

<button class="btn btn-success">
Simpan
</button>

<button class="btn btn-primary">
Kirim ke Dinas
</button>

</div>

</div>

<!-- CUTI -->

<div class="tab-pane fade" id="cuti">

<h5>Usulan Cuti</h5>

<div class="row">

<div class="col-md-6">

<label>NIP</label>
<input class="form-control">

</div>

<div class="col-md-6">

<label>Nama</label>
<input class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Jenis Cuti</label>

<select class="form-select">

<option>Tahunan</option>

<option>Sakit</option>

<option>Melahirkan</option>

<option>Besar</option>

<option>Alasan Penting</option>

</select>

</div>

<div class="col-md-3 mt-3">

<label>Tanggal Mulai</label>

<input type="date" class="form-control">

</div>

<div class="col-md-3 mt-3">

<label>Tanggal Selesai</label>

<input type="date" class="form-control">

</div>

</div>

<hr>

<h6>Upload Dokumen</h6>

<div class="mb-2">
<label>Surat Permohonan</label>
<input type="file" class="form-control">
</div>

<div class="mb-2">
<label>Surat Dokter (Jika Ada)</label>
<input type="file" class="form-control">
</div>

<div class="mb-2">
<label>Dokumen Pendukung</label>
<input type="file" class="form-control">
</div>

<div class="text-end">

<button class="btn btn-success">
Simpan
</button>

<button class="btn btn-primary">
Kirim ke Dinas
</button>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
