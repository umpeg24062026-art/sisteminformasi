<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIMPEGDIK NGADA</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <img src="assets/logo-ngada.png" class="logo">

        <h2>SIMPEGDIK NGADA</h2>

        <p>
            Sistem Informasi Guru dan Pegawai
            <br>
            Dinas Pendidikan dan Kebudayaan
            <br>
            Kabupaten Ngada
        </p>

        <form id="loginForm">

            <input
                type="text"
                id="username"
                placeholder="Username"
                required>

            <input
                type="password"
                id="password"
                placeholder="Password"
                required>

            <button type="submit">
                LOGIN
            </button>

        </form>

        <p id="pesan" style="color:red;"></p>

    </div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    // Username dan password contoh
    if (username === "admin" && password === "12345") {
        window.location.href = "dashboard.html";
    } else {
        document.getElementById("pesan").innerText =
            "Username atau password salah!";
    }
});
</script>

</body>
</html>
