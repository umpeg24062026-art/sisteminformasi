<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIMPEGDIK NGADA</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <img src="assets/logo-ngada.png" class="logo">

        <h2>SIMPEGDIK NGADA</h2>

        <p>
            Sistem Informasi Guru dan Pegawai
            <br>
            Dinas Pendidikan dan Kebudayaan
            <br>
            Kabupaten Ngada
        </p>

        <form>

            <input
                type="text"
                placeholder="Username"
                required>

            <input
                type="password"
                placeholder="Password"
                required>

            <button type="submit">
                LOGIN
            </button>

        </form>

    </div>

</div>

</body>
</html>
