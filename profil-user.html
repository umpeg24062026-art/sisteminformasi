<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Profil User | SIMPEGDIK NGADA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    font-family:'Segoe UI',sans-serif;
}

.header{
    background:#1565C0;
    color:#fff;
    padding:20px;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.profile-photo{
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #1565C0;
}

.form-control,
.form-select{
    border-radius:8px;
}

.btn{
    border-radius:8px;
}

</style>

</head>

<body>

<div class="header">

<h3>
<i class="bi bi-person-circle"></i>
Profil Pengguna
</h3>

<p>SIMPEGDIK NGADA - Dinas Pendidikan dan Kebudayaan Kabupaten Ngada</p>

</div>

<div class="container mt-4">

<div class="row">

<!-- FOTO -->

<div class="col-md-4">

<div class="card">

<div class="card-body text-center">

<img src="https://via.placeholder.com/160"
class="profile-photo">

<h4 class="mt-3">Maria Yosefa</h4>

<p class="text-muted">

Operator Sekolah

</p>

<hr>

<button class="btn btn-primary">

<i class="bi bi-camera-fill"></i>

Ubah Foto

</button>

</div>

</div>

</div>

<!-- DATA PROFIL -->

<div class="col-md-8">

<div class="card">

<div class="card-header bg-primary text-white">

<b>Informasi Pengguna</b>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-6">

<label>Nama Lengkap</label>

<input type="text"
class="form-control"
value="Maria Yosefa">

</div>

<div class="col-md-6">

<label>NIP</label>

<input type="text"
class="form-control"
value="198709092010011001">

</div>

<div class="col-md-6 mt-3">

<label>Username</label>

<input type="text"
class="form-control"
value="operator01">

</div>

<div class="col-md-6 mt-3">

<label>Email</label>

<input type="email"
class="form-control"
value="operator@gmail.com">

</div>

<div class="col-md-6 mt-3">

<label>No. HP</label>

<input type="text"
class="form-control"
value="081234567890">

</div>

<div class="col-md-6 mt-3">

<label>Role</label>

<input type="text"
class="form-control"
value="Operator Sekolah"
readonly>

</div>

<div class="col-md-6 mt-3">

<label>Sekolah / Unit Kerja</label>

<input type="text"
class="form-control"
value="SMP Negeri 1 Bajawa">

</div>

<div class="col-md-6 mt-3">

<label>Status Akun</label>

<input type="text"
class="form-control"
value="Aktif"
readonly>

</div>

</div>

<div class="text-end mt-4">

<button class="btn btn-success">

<i class="bi bi-save-fill"></i>

Simpan Perubahan

</button>

</div>

</div>

</div>

<!-- PASSWORD -->

<div class="card mt-4">

<div class="card-header bg-warning">

<b>Ubah Password</b>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-4">

<label>Password Lama</label>

<input type="password"
class="form-control">

</div>

<div class="col-md-4">

<label>Password Baru</label>

<input type="password"
class="form-control">

</div>

<div class="col-md-4">

<label>Konfirmasi Password</label>

<input type="password"
class="form-control">

</div>

</div>

<div class="text-end mt-4">

<button class="btn btn-danger">

<i class="bi bi-key-fill"></i>

Ganti Password

</button>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
